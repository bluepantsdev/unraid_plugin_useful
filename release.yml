name: Build and Release

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build package
        run: bash build.sh

      - name: Get SHA256
        id: sha
        run: echo "sha=$(cat release/useful.txz.sha256)" >> $GITHUB_OUTPUT

      - name: Update .plg SHA256
        run: |
          VERSION="${{ github.ref_name }}"
          sed -i "s|<!ENTITY version.*|<!ENTITY version   \"$VERSION\">|" useful.plg
          sed -i "s|<!ENTITY pkgSHA256.*|<!ENTITY pkgSHA256 \"${{ steps.sha.outputs.sha }}\">|" useful.plg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/useful.txz
            useful.plg
          body: "Release ${{ github.ref_name }}"
